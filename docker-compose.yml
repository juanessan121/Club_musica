version: '3.8'

# =============================================================================
# DOCKER-COMPOSE.YML - Sistema Club de Música (Refactorizado)
# =============================================================================
# Autores: Juan Sandoval, Braulio Silva, Javier Herrada
# Stack: MariaDB + Python Flask API + Node WhatsApp Bridge + React
# =============================================================================

services:
  # ==========================================================================
  # BASE DE DATOS - MariaDB
  # ==========================================================================
  db-mariadb:
    image: mariadb:10.11
    container_name: club-musica-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-club_musica}
      MYSQL_USER: ${DB_USER:-clubmusica}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clubmusica_secret_2026}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./schema_musica.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${DB_PORT:-3307}:3306"
    networks:
      - club-musica-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================================================
  # BACKEND API - Python (Flask)
  # ==========================================================================
  api-flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: club-musica-api-flask
    restart: unless-stopped
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=${FLASK_ENV:-production}
      - DB_HOST=db-mariadb
      - DB_USER=${DB_USER:-clubmusica}
      - DB_PASSWORD=${DB_PASSWORD:-clubmusica_secret_2026}
      - DB_NAME=${DB_NAME:-club_musica}
      - JWT_SECRET=${JWT_SECRET:-cambia-este-secreto-en-produccion}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:8088}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@universidad.edu}
      - WHATSAPP_BRIDGE_URL=http://whatsapp-bridge:3002
    volumes:
      - ./api:/app
    ports:
      - "5000:5000"
    networks:
      - club-musica-network
    depends_on:
      db-mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ==========================================================================
  # WHATSAPP BRIDGE - Node.js (whatsapp-web.js)
  # ==========================================================================
  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: club-musica-whatsapp-bridge
    restart: unless-stopped
    environment:
      - PORT=3002
    volumes:
      - ./whatsapp-bridge:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    networks:
      - club-musica-network
    depends_on:
      api-flask:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ==========================================================================
  # FRONTEND - React
  # ==========================================================================
  web-musica-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: club-musica-web-react
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-}
      - PORT=3001
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    ports:
      - "${WEB_PORT:-3001}:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - club-musica-network
    depends_on:
      api-flask:
        condition: service_healthy

  # ==========================================================================
  # NGINX - Reverse Proxy
  # ==========================================================================
  nginx-proxy:
    image: nginx:alpine
    container_name: club-musica-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    networks:
      - club-musica-network
    depends_on:
      - api-flask
      - web-musica-react

# =============================================================================
# VOLUMES & NETWORKS
# =============================================================================
volumes:
  mariadb_data:

networks:
  club-musica-network:
    driver: bridge
