version: '3.8'

# =============================================================================
# DOCKER-COMPOSE.YML - Sistema Club de Música (Refactorizado)
# =============================================================================
# Autores: Juan Sandoval, Braulio Silva, Javier Herrada
# Stack: MariaDB + Python Flask API + Node WhatsApp Bridge + React
# =============================================================================

services:
  # ==========================================================================
  # BASE DE DATOS - MariaDB
  # ==========================================================================
  db-mariadb:
    image: mariadb:10.11
    container_name: club-musica-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-club_musica}
      MYSQL_USER: ${DB_USER:-clubmusica}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clubmusica_secret_2026}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./schema_musica.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - club-musica-network

  # ==========================================================================
  # BACKEND API - Python (Flask)
  # ==========================================================================
  api-flask:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: club-musica-api-flask
    restart: unless-stopped
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=development
      - DB_HOST=db-mariadb
      - DB_USER=${DB_USER:-clubmusica}
      - DB_PASSWORD=${DB_PASSWORD:-clubmusica_secret_2026}
      - DB_NAME=${DB_NAME:-club_musica}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@universidad.edu}
      - WHATSAPP_BRIDGE_URL=http://whatsapp-bridge:3002
    volumes:
      - ./api:/app
    ports:
      - "5000:5000"
    networks:
      - club-musica-network
    depends_on:
      - db-mariadb

  # ==========================================================================
  # WHATSAPP BRIDGE - Node.js (whatsapp-web.js)
  # ==========================================================================
  whatsapp-bridge:
    build:
      context: ./whatsapp-bridge
      dockerfile: Dockerfile
    container_name: club-musica-whatsapp-bridge
    restart: unless-stopped
    environment:
      - PORT=3002
    volumes:
      - ./whatsapp-bridge:/app
      - /app/node_modules
    ports:
      - "3002:3002"
    networks:
      - club-musica-network
    depends_on:
      - api-flask

  # ==========================================================================
  # FRONTEND - React
  # ==========================================================================
  web-musica-react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: club-musica-web-react
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost/api
    ports:
      - "${WEB_PORT:-3001}:3001"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - club-musica-network
    depends_on:
      - api-flask

  # ==========================================================================
  # NGINX - Reverse Proxy
  # ==========================================================================
  nginx-proxy:
    image: nginx:alpine
    container_name: club-musica-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    networks:
      - club-musica-network
    depends_on:
      - api-flask
      - web-musica-react

# =============================================================================
# VOLUMES & NETWORKS
# =============================================================================
volumes:
  mariadb_data:

networks:
  club-musica-network:
    driver: bridge
